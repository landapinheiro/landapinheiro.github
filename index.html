<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sarau de Mim</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>

<body>

<div class="container">

<!-- INFORMAÇÕES DO EVENTO -->

<div class="info-evento">

<div class="detalhe">
<i class="bi bi-calendar-event"></i>
15 de Outubro
</div>

<div class="detalhe">
<i class="bi bi-clock"></i>
20:00
</div>

<div class="detalhe">
<i class="bi bi-geo-alt"></i>
Espaço Cultural Landa
</div>

</div>


<!-- PLAYER -->

<div class="player">

<h1 class="titulo">
DO CÉU AO CORAÇÃO: SARAU DE MIM
</h1>

<div class="barra">

<span>0:00</span>

<input type="range" value="0">

<span>4:05</span>

</div>


<div class="controles">

<button>
<i class="bi bi-shuffle"></i>
</button>

<button>
<i class="bi bi-skip-backward-fill"></i>
</button>

<button class="play">
<i class="bi bi-play-fill"></i>
</button>

<button>
<i class="bi bi-skip-forward-fill"></i>
</button>

<button>
<i class="bi bi-repeat"></i>
</button>

</div>

<a href="#confirmar" class="botao">
Confirmar presença
</a>

</div>

</div>


<!-- CONFIRMAR PRESENÇA -->

<section id="confirmar">

<h2>Confirmar presença</h2>

<form>

<input type="text" placeholder="Seu nome">

<input type="tel" placeholder="Telefone">

<input type="number" placeholder="Acompanhantes">

<button type="submit">
Confirmar
</button>

</form>

</section>

</body>
</html>
