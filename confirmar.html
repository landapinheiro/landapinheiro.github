<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmar Presença | Sarau de Mim</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="pagina-form">
  <section class="card-form">
    <header class="topo-form">
      <h1>Confirmar presença</h1>
      <p>Preencha seus dados para confirmar no Sarau de Mim.</p>
    </header>

    <form class="form-confirmacao" method="post" action="#">
      <div>
        <label for="nome">Seu nome</label>
        <input id="nome" name="nome" type="text" placeholder="Digite seu nome" required>
      </div>

      <div>
        <label for="telefone">Telefone</label>
        <input id="telefone" name="telefone" type="tel" placeholder="(00) 00000-0000" required>
      </div>

      <div>
        <label for="acompanhantes">Acompanhantes</label>
        <input id="acompanhantes" name="acompanhantes" type="number" min="0" placeholder="0">
      </div>

      <div>
        <label for="obs">Observações (opcional)</label>
        <textarea id="obs" name="obs" rows="3" placeholder="Alguma informação importante?"></textarea>
      </div>

      <button type="submit">Confirmar</button>
    </form>

    <a href="index.html" class="voltar">← Voltar para o convite</a>
  </section>
</body>
</html>
