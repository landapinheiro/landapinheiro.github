<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmar Presença - Sarau de Mim</title>

<link rel="stylesheet" href="style.css">

<!-- melhoria tipográfica -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
  /* ===== FLOATING LABEL ===== */
  .form-group {
    position: relative;
    margin-bottom: 16px;
  }

  .form-group input,
  .form-group textarea {
    width: 100%;
    min-width: 0;
    padding: 14px 12px 6px 12px;
    border-radius: 8px;
    border: 2px solid #2c2c2c;
    background: #1b1b1b;
    color: #fff;
    font: inherit;
    outline: none;
    transition: all 0.3s ease;
    padding-top: 20px;
  }

  .form-group label {
    position: absolute;
    top: 16px;
    left: 12px;
    font-size: 13px;
    color: #d8d8d8;
    transition: all 0.3s ease;
    pointer-events: none;
    transform-origin: left;
  }

  /* Label sobe quando input tem valor ou está focado */
  .form-group input:focus ~ label,
  .form-group input:not(:placeholder-shown) ~ label,
  .form-group textarea:focus ~ label,
  .form-group textarea:not(:placeholder-shown) ~ label {
    top: 4px;
    font-size: 11px;
    color: var(--accent);
    transform: scale(0.9);
  }

  /* ===== GLOW NO FOCUS ===== */
  .form-group input:focus,
  .form-group textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(179, 38, 30, 0.4), inset 0 0 8px rgba(179, 38, 30, 0.1);
    background: #222;
  }

  .form-group textarea {
    resize: vertical;
  }

  /* ===== RIPPLE NO BOTÃO ===== */
  .form-confirmacao button {
    position: relative;
    overflow: hidden;
    margin-top: 6px;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(179, 38, 30, 0.3);
  }

  .form-confirmacao button::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
  }

  .form-confirmacao button:active::before {
    width: 300px;
    height: 300px;
  }

  .form-confirmacao button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(179, 38, 30, 0.4);
    background: #a01f17;
  }

  .form-confirmacao button:active {
    transform: translateY(0);
  }

  .form-confirmacao button:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
  }

  .form-confirmacao button:disabled:hover {
    box-shadow: 0 4px 12px rgba(179, 38, 30, 0.3);
  }

  /* ===== MENSAGEM DE SUCESSO ===== */
  .sucesso {
    display: none;
    text-align: center;
    padding: 30px 20px;
    background: rgba(46, 125, 50, 0.1);
    border-radius: 12px;
    border: 2px solid #2e7d32;
    margin-top: 20px;
    animation: slideInUp 0.6s ease-out;
  }

  .sucesso.ativo {
    display: block;
  }

  .sucesso h2 {
    color: #2e7d32;
    margin: 0 0 10px 0;
    font-family: "Cormorant Garamond", serif;
    font-size: 28px;
    animation: slideInDown 0.6s ease-out 0.2s backwards;
  }

  .sucesso p {
    color: #1b5e20;
    margin: 0;
    font-size: 14px;
    animation: slideInUp 0.6s ease-out 0.3s backwards;
  }

  /* ===== CHECKMARK ANIMADO ===== */
  .checkmark {
    font-size: 60px;
    color: #2e7d32;
    margin-bottom: 15px;
    display: inline-block;
    animation: checkmarkBounce 0.6s ease-out;
  }

  @keyframes checkmarkBounce {
    0% {
      transform: scale(0) rotate(-45deg);
      opacity: 0;
    }
    50% {
      transform: scale(1.2);
    }
    100% {
      transform: scale(1) rotate(0deg);
      opacity: 1;
    }
  }

  /* ===== CONFETE ===== */
  .confete-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }

  .confete {
    position: absolute;
    font-size: 20px;
    opacity: 1;
  }

  /* ===== ANIMAÇÕES BASE ===== */
  @keyframes slideInUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes slideInDown {
    from {
      opacity: 0;
      transform: translateY(-20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes confeteQueda {
    to {
      transform: translateY(100vh) rotate(360deg);
      opacity: 0;
    }
  }

  @keyframes confeteBalanco {
    0%, 100% {
      transform: translateX(0) rotate(0deg);
    }
    25% {
      transform: translateX(20px) rotate(10deg);
    }
    75% {
      transform: translateX(-20px) rotate(-10deg);
    }
  }
</style>

</head>

<body>

<!-- Container pro confete -->
<div class="confete-container" id="confeteContainer"></div>

<div class="pagina-form">

  <div class="card-form">

    <div class="topo-form">
      <h1>Confirmação</h1>
      <p>Por favor, preencha seus dados abaixo</p>
    </div>

    <form class="form-confirmacao" id="formulario" method="POST" action="https://formspree.io/f/maqpepop">

      <div class="form-group">
        <input type="text" id="nome" name="nome" placeholder=" " required>
        <label for="nome">Nome completo</label>
      </div>

      <div class="form-group">
        <input type="email" id="email" name="email" placeholder=" " required>
        <label for="email">E-mail</label>
      </div>

      <div class="form-group">
        <input type="tel" id="telefone" name="telefone" placeholder=" " required>
        <label for="telefone">Telefone</label>
      </div>

      <div class="form-group">
        <textarea id="mensagem" name="mensagem" rows="4" placeholder=" "></textarea>
        <label for="mensagem">Mensagem (opcional)</label>
      </div>

      <button type="submit" id="btnSubmit">Confirmar Presença</button>

    </form>

    <div class="sucesso" id="sucessoMsg">
      <div class="checkmark">✓</div>
      <h2>Presença Confirmada! 🎉</h2>
      <p>Obrigado por confirmar! Nos vemos no evento.</p>
    </div>

    <a href="index.html" class="voltar">← Voltar</a>

  </div>

</div>

<script>
  const formulario = document.getElementById('formulario');
  const sucessoMsg = document.getElementById('sucessoMsg');
  const btnSubmit = document.getElementById('btnSubmit');
  const confeteContainer = document.getElementById('confeteContainer');

  // ===== CONFETE =====
  function criarConfete() {
    const confetes = ['🎉', '🎊', '✨', '🎈', '🎁', '🎭', '🎵', '🎤'];
    
    for (let i = 0; i < 60; i++) {
      const confete = document.createElement('div');
      confete.className = 'confete';
      confete.textContent = confetes[Math.floor(Math.random() * confetes.length)];
      confete.style.left = Math.random() * 100 + '%';
      confete.style.top = '-20px';
      confete.style.opacity = Math.random() * 0.5 + 0.5;
      
      const duracao = Math.random() * 3 + 2.5;
      confete.style.animation = `confeteQueda ${duracao}s linear, confeteBalanco ${Math.random() * 2 + 2}s ease-in-out infinite`;
      
      confeteContainer.appendChild(confete);

      // Remove depois da animação
      setTimeout(() => confete.remove(), duracao * 1000);
    }
  }

  // ===== ENVIO DO FORMULÁRIO =====
  formulario.addEventListener('submit', function(e) {
    e.preventDefault();

    // Desabilita o botão enquanto envia
    btnSubmit.disabled = true;
    const textoOriginal = btnSubmit.textContent;
    btnSubmit.textContent = 'Enviando...';

    // Envia pra Formspree
    fetch(formulario.action, {
      method: 'POST',
      body: new FormData(formulario),
      headers: {
        'Accept': 'application/json'
      }
    }).then(response => {
      if (response.ok) {
        // Cria confete
        criarConfete();

        // Esconde o formulário e mostra mensagem de sucesso
        formulario.style.display = 'none';
        sucessoMsg.classList.add('ativo');

        // Redireciona pro home depois de 4 segundos
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 4000);
      } else {
        throw new Error('Erro na resposta');
      }
    }).catch(error => {
      btnSubmit.disabled = false;
      btnSubmit.textContent = textoOriginal;
      alert('Erro ao enviar. Tente novamente!');
      console.error('Erro:', error);
    });
  });
</script>

</body>

</html>
